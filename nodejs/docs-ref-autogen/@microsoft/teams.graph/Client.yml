### YamlMime:TSType
name: Client
uid: '@microsoft/teams.graph.Client'
package: '@microsoft/teams.graph'
summary: |-
  /
  Provides an entry point for invoking Microsoft Graph APIs.
fullName: Client
remarks: ''
isDeprecated: false
type: class
constructors:
  - name: Client(Options, GraphOptions)
    uid: '@microsoft/teams.graph.Client.constructor'
    package: '@microsoft/teams.graph'
    summary: |+
      Creates a Graph client.

      **Example**

      ```ts
      // Public cloud (default)
      new Client({ token });
      ```



      **Example**

      ```ts
      // Sovereign cloud (GCCH)
      new Client(httpClient, { baseUrlRoot: 'https://graph.microsoft.us' });
      ```

    remarks: ''
    isDeprecated: false
    syntax:
      content: 'new Client(options?: Options, graphOptions?: GraphOptions)'
      parameters:
        - id: options
          type: Options
          description: >-
            The HTTP client to use; an existing <xref:HttpClient> will be
            cloned,

            or an <xref:HttpClientOptions> bag will be used to build a new one.

            HTTP-level settings like headers, interceptors, and timeouts belong
            here.
        - id: graphOptions
          type: GraphOptions
          description: |-
            Graph-specific options. Takes precedence over `options.baseUrlRoot`
            when both are set.
properties:
  - name: http
    uid: '@microsoft/teams.graph.Client.http'
    package: '@microsoft/teams.graph'
    summary: >-
      The underlying HTTP client, pre-configured with Graph base URL and
      headers.

      Use for raw Graph API requests not covered by endpoint functions.
    fullName: http
    remarks: ''
    isDeprecated: false
    syntax:
      content: Client http
      return:
        description: ''
        type: <xref uid="@microsoft/teams.common.Client" />
methods:
  - name: call<F, R>(F, [Object, Object])
    uid: '@microsoft/teams.graph.Client.call'
    package: '@microsoft/teams.graph'
    summary: |+
      Executes a Graph API endpoint function with optional HTTP configuration

      **Example**

      ```typescript
      // Simple call
      const user = await client.call(endpoints.users.get, 'user-id');

      // With HTTP configuration
      const user = await client.call(endpoints.users.get, 'user-id', {
        requestConfig: {
          timeout: 5000
        }
      });
      ```

    remarks: ''
    isDeprecated: false
    syntax:
      content: 'function call<F, R>(func: F, args: [Object, Object]): Promise<R>'
      parameters:
        - id: func
          type: F
          description: The endpoint function to execute
        - id: args
          type: '[Object, Object]'
          description: >-
            Arguments for the endpoint function, optionally followed by
            <xref:CallConfig>
      return:
        description: Promise resolving to the endpoint's response data
        type: Promise&lt;R&gt;
