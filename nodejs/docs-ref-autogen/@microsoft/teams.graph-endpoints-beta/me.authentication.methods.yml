  - name: list(any)
    uid: '@microsoft/teams.graph-endpoints-beta.me.authentication.methods.list'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET /me/authentication/methods`


      Retrieve a list of authentication methods registered to a user. The
      authentication methods are defined by the types derived from the
      authenticationMethod resource type, and only the methods supported on this
      API version. See Microsoft Entra authentication methods API overview for a
      list of currently supported methods. We don&#x27;t recommend using the
      authentication methods APIs for scenarios where you need to iterate over
      your entire user population for auditing or security check purposes. For
      these types of scenarios, we recommend using the authentication method
      registration and usage reporting APIs.
    remarks: ''
    isDeprecated: false
