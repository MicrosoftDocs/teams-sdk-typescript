  - name: list(any)
    uid: >-
      @microsoft/teams.graph-endpoints-beta.roleManagement.directory.transitiveRoleAssignments.list
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET /roleManagement/directory/transitiveRoleAssignments`


      Get the list of direct and transitive unifiedRoleAssignment objects for a
      specific principal. For example, if a user is assigned a Microsoft Entra
      role through group membership, the role assignment is transitive, and this
      request will list the group&#x27;s ID as the principalId. Results can also
      be filtered by the roleDefinitionId and directoryScopeId. Supported only
      for directory (Microsoft Entra ID) provider. For more information, see Use
      Microsoft Entra groups to manage role assignments.
    remarks: ''
    isDeprecated: true
    customDeprecatedMessage: ''
