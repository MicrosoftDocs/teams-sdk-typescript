  - name: del(any)
    uid: >-
      @microsoft/teams.graph-endpoints-beta.identityGovernance.entitlementManagement.accessPackages.del
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `DELETE
      /identityGovernance/entitlementManagement/accessPackages/{accessPackage-id}`


      Delete an accessPackage object. You can&#x27;t delete an access package if
      it has any accessPackageAssignment. To delete the access package, first
      query if there are any assignments with a filter to indicate the specific
      access package, such as: $filter&#x3D;accessPackage/id eq
      &#x27;a914b616-e04e-476b-aa37-91038f0b165b&#x27;. For more information on
      how to remove assignments that are still in the delivered state, see
      Remove an assignment.
    remarks: ''
