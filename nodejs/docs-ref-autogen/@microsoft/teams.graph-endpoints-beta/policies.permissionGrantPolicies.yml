    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `POST /policies/permissionGrantPolicies`


      Creates a permissionGrantPolicy. A permission grant policy is used to
      describe the conditions under which permissions can be granted (for
      example, during application consent). After creating the permission grant
      policy, you can add include condition sets to add matching rules, and add
      exclude condition sets to add exclusion rules.
    remarks: ''
    isDeprecated: false
