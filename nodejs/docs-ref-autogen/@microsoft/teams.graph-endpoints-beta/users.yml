  - name: del(any)
    uid: '@microsoft/teams.graph-endpoints-beta.users.del'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `DELETE /users/{user-id}`


      Delete a user object.   When deleted, user resources, including their
      mailbox and license assignments, are moved to a temporary container and if
      the user is restored within 30 days, these objects are restored to them.
      The user is also restored to any groups they were a member of. After 30
      days and if not restored, the user object is permanently deleted and their
      assigned resources freed. To manage the deleted user object, see
      deletedItems.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function del(params?: any): EndpointRequest<IEndpoints["DELETE
        /users/{user-id}"]["response"]>
      parameters:
        - id: params
          type: any
          description: ''
      return:
        description: ''
        type: >-
          EndpointRequest&lt;IEndpoints["DELETE
          /users/{user-id}"]["response"]&gt;
  - name: get(any)
    uid: '@microsoft/teams.graph-endpoints-beta.users.get'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET /users/{user-id}`


      Retrieve the properties and relationships of user object. This operation
      returns by default only a subset of the more commonly used properties for
      each user. These default properties are noted in the Properties section.
      To get properties that are not returned by default, do a GET operation for
      the user and specify the properties in a $select OData query option.
      Because the user resource supports extensions, you can also use the GET
      operation to get custom properties and extension data in a user instance.
      Customers through Microsoft Entra ID for customers can also use this API
      operation to retrieve their details.
    remarks: ''
    isDeprecated: false
