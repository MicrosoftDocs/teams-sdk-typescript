functions:
  - name: create(Operation<"/users", "post">)
    uid: '@microsoft/teams.graph-endpoints-beta.users.create'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `POST /users`


      Create a new user.

      The request body contains the user to create. At a minimum, you must
      specify the required properties for the user. You can optionally specify
      any other writable properties. This operation returns by default only a
      subset of the properties for each user. These default properties are noted
      in the Properties section. To get properties that are not returned by
      default, do a GET operation and specify the properties in a $select OData
      query option.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function create(body: Operation<"/users", "post">):
        EndpointRequest<IEndpoints["POST /users"]["response"]>
