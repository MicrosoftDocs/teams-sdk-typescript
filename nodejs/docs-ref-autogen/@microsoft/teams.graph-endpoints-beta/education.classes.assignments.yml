  - name: list(any)
    uid: '@microsoft/teams.graph-endpoints-beta.education.classes.assignments.list'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET /education/classes/{educationClass-id}/assignments`


      Retrieve a list of educationAssignment objects. Only teachers, students,
      and applications with application permissions can perform this operation.
      A teacher or an application executing with application permissions can see
      all assignment objects for the class. Students can only see assignments
      that are assigned to them.
