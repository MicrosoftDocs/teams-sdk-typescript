  - name: get(any)
    uid: '@microsoft/teams.graph-endpoints-beta.education.classes.assignments.get'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET
      /education/classes/{educationClass-id}/assignments/{educationAssignment-id}`


      Get the properties and relationships of an assignment. Only teachers,
      students, and applications with application permissions can perform this
      operation. Students can only see assignments assigned to them; teachers
      and applications with application permissions can see all assignments in a
      class. You can use the Prefer header in your request to get the inactive
      status in case the assignment is deactivated; otherwise, the response
      value for the status property is unknownFutureValue.
    remarks: ''
    isDeprecated: false
