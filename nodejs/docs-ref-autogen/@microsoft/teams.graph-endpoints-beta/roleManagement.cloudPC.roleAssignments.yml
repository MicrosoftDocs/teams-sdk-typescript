    summary: >-
      `POST /roleManagement/cloudPC/roleAssignments`


      Create a new unifiedRoleAssignmentMultiple object for an RBAC provider. 
      The following RBAC providers are currently supported:

      - Cloud PC

      - device management (Intune)

      - Defender (Microsoft Defender XDR) For other Microsoft 365 applications
      (like Microsoft Entra ID), use unifiedRoleAssignment.
