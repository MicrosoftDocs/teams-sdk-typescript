    uid: '@microsoft/teams.graph-endpoints-beta.teams.channels.create'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `POST /teams/{team-id}/channels`


      Create a new channel in a team, as specified in the request body. When you
      create a channel, the maximum length of the channel&#x27;s displayName is
      50 characters. This display name appears to the user in Microsoft Teams.
      You can add a maximum of 200 members when you create a private channel.
