    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET
      /identityGovernance/entitlementManagement/accessPackageAssignmentPolicies`


      Retrieve a list of accessPackageAssignmentPolicy objects in Microsoft
      Entra entitlement management. If the delegated user is in a directory
      role, the resulting list includes all the assignment policies that the
      caller has access to read, across all catalogs and access packages.  If
      the delegated user is an access package manager or catalog owner, they
      should instead retrieve the policies for the access packages they can read
      with list accessPackages by including
      $expand&#x3D;accessPackageAssignmentPolicies in the query.
