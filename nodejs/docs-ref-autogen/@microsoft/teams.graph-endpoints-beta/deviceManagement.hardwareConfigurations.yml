  - name: get(any)
    uid: >-
      @microsoft/teams.graph-endpoints-beta.deviceManagement.hardwareConfigurations.get
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET /deviceManagement/hardwareConfigurations/{hardwareConfiguration-id}`


      BIOS configuration and other settings provides customers the ability to
      configure hardware/bios settings on the enrolled Windows 10/11 Entra ID
      joined devices by uploading a configuration file generated with their OEM
      tool (e.g. Dell Command tool). A BIOS configuration policy can be assigned
      to multiple devices, allowing admins to remotely control a device&#x27;s
      hardware properties (e.g. enable Secure Boot) from the Intune Portal.
      Supported for Dell only at this time.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function get(params?: any): EndpointRequest<IEndpoints["GET
