    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET
      /identity/b2cUserFlows/{b2cIdentityUserFlow-id}/languages/{userFlowLanguageConfiguration-id}`


      Read the properties and relationships of a userFlowLanguageConfiguration
      object. These objects represent a language available in a user flow. Note:
      To retrieve a language supported for customization, you must first enable
      language customization on your Azure AD B2C user flow. For more
      information, see Update b2cIdentityUserFlow. Language customization is
      enabled by default in Microsoft Entra user flows.
    remarks: ''
