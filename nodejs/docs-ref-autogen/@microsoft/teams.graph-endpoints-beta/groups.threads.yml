    summary: >-
      `POST /groups/{group-id}/threads`


      Start a new group conversation by first creating a thread. A new
      conversation, conversation thread, and post are created in the group. Use
      reply thread or reply post to further post to that thread. Note: You can
      also start a new thread in an existing conversation.
