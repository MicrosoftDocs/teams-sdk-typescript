    uid: >-
      @microsoft/teams.graph-endpoints-beta.identityGovernance.accessReviews.definitions.instances.update
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `PATCH
      /identityGovernance/accessReviews/definitions/{accessReviewScheduleDefinition-id}/instances/{accessReviewInstance-id}`


      Update the properties of an accessReviewInstance object. Only the
      reviewers and fallbackReviewers properties can be updated but the scope
      property is also required in the request body. You can only add reviewers
      to the fallbackReviewers property but can&#x27;t remove existing
      fallbackReviewers. To update an accessReviewInstance, its status must be
      InProgress.
    remarks: ''
    isDeprecated: false
