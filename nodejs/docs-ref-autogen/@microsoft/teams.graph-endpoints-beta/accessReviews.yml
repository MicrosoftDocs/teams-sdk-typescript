functions:
  - name: create(Operation<"/accessReviews", "post">)
    uid: '@microsoft/teams.graph-endpoints-beta.accessReviews.create'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `POST /accessReviews`


      In the Microsoft Entra access reviews feature, create a new accessReview
      object. Before making this request, the caller must have previously
      retrieved the list of business flow templates, to have the value of
      businessFlowTemplateId to include in the request. After making this
      request, the caller should create a programControl, to link the access
      review to a program.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function create(body: Operation<"/accessReviews", "post">):
        EndpointRequest<IEndpoints["POST /accessReviews"]["response"]>
