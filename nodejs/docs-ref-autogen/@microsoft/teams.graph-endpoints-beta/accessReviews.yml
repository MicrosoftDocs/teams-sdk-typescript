  - name: get(any)
    uid: '@microsoft/teams.graph-endpoints-beta.accessReviews.get'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET /accessReviews/{accessReview-id}`


      In the Microsoft Entra access reviews feature, retrieve an accessReview
      object.   To retrieve the reviewers of the access review, use the list
      accessReview reviewers API. To retrieve the decisions of the access
      review, use the list accessReview decisions API, or the list my
      accessReview decisions API. If this is a recurring access review, no
      decisions will be associated with the recurring access review series.
      Instead, use the instances relationship of that series to retrieve an
      accessReview collection of the past, current, and future instances of the
      access review. Each past and current instance will have decisions.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function get(params?: any): EndpointRequest<IEndpoints["GET
        /accessReviews/{accessReview-id}"]["response"]>
      parameters:
        - id: params
          type: any
          description: ''
      return:
        description: ''
        type: >-
          EndpointRequest&lt;IEndpoints["GET
          /accessReviews/{accessReview-id}"]["response"]&gt;
  - name: list(any)
    uid: '@microsoft/teams.graph-endpoints-beta.accessReviews.list'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET /accessReviews`


      Retrieve the accessReview objects for a particular businessFlowTemplate. A
      list of zero or more accessReview objects are returned, for each one-time
      and recurring access review that was created with that business flow
      template.  Business flow template IDs are case sensitive. If many access
      reviews match the filter, to improve efficiency and avoid timeouts,
      retrieve the result set in pages, by including both the $top query
      parameter with a page size, for example 100, and the $skip&#x3D;0 query
      parameter in the request. These parameters can be included even when you
      don&#x27;t anticipate that the request spans multiple pages. When a result
      set spans multiple pages, Microsoft Graph returns that page with an
      @odata.nextLink property in the response that contains a URL to the next
      page of results. If that property is present, continue making requests
      with the @odata.nextLink URL in each response, until all the results are
      returned, as described in paging Microsoft Graph data in your app. The
      accessReview objects returned by this API don&#x27;t include nested
      structure properties such as settings, or relationships.  To retrieve an
      access review settings or relationships, use the get accessReview API.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function list(params?: any): EndpointRequest<IEndpoints["GET
        /accessReviews"]["response"]>
      parameters:
        - id: params
          type: any
          description: ''
      return:
        description: ''
        type: EndpointRequest&lt;IEndpoints["GET /accessReviews"]["response"]&gt;
  - name: update(Operation<"/accessReviews/{accessReview-id}", "patch">, any)
    uid: '@microsoft/teams.graph-endpoints-beta.accessReviews.update'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `PATCH /accessReviews/{accessReview-id}`


      In the Microsoft Entra access reviews feature, update an existing
      accessReview object to change one or more of its properties. This API is
      not intended to change the reviewers or decisions of a review.  To change
      the reviewers, use the addReviewer or removeReviewer APIs.  To stop an
      already-started one-time review, or an already-started instance of a
      recurring review, early, use the stop API. To apply the decisions to the
      target group or app access rights, use the apply API.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function update(body: Operation<"/accessReviews/{accessReview-id}",
        "patch">, params?: any): EndpointRequest<IEndpoints["PATCH
