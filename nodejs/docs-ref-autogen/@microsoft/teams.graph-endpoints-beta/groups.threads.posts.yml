functions:
  - name: get(any)
    uid: '@microsoft/teams.graph-endpoints-beta.groups.threads.posts.get'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET /groups/{group-id}/threads/{conversationThread-id}/posts/{post-id}`


      Get the properties and relationships of a post in a specified thread. You
      can specify both the parent

      conversation and the thread, or, you can specify the thread without
      referencing the parent conversation. Since the post resource supports
      extensions, you can also use the GET operation to get custom properties
      and extension data in a post instance.
    remarks: ''
    isDeprecated: false
