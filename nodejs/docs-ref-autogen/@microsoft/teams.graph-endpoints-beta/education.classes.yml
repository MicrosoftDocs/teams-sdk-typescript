functions:
  - name: create(Operation<"/education/classes", "post">)
    uid: '@microsoft/teams.graph-endpoints-beta.education.classes.create'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `POST /education/classes`


      Create a new class. This will also create a universal group. When you use
      this API to create a class, it will add special properties to the group,
      which will

      add features such as assignments and special handling within Microsoft
      Teams when teams are created using the group. Please note that this API
      only creates the universal group and does not create a team. Microsoft
      Teams provides a user interface for teachers to create teams for their own
      classes using the groups created by this API.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function create(body: Operation<"/education/classes", "post">):
        EndpointRequest<IEndpoints["POST /education/classes"]["response"]>
