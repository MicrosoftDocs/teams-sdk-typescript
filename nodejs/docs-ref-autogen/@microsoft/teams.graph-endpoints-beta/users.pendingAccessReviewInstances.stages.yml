    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET
      /users/{user-id}/pendingAccessReviewInstances/{accessReviewInstance-id}/stages/{accessReviewStage-id}`


      If the instance has multiple stages, this returns the collection of
      stages. A new stage will only be created when the previous stage ends. The
      existence, number, and settings of stages on a review instance are created
      based on the accessReviewStageSettings on the parent
      accessReviewScheduleDefinition.
