    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `POST /groups/{group-id}/conversations/{conversation-id}/threads`


      Create a new thread in the specified conversation. A thread and post are
      created as specified. Use reply thread to further post

      to that thread. Or, if you get the post ID, you can also reply to that
      post in that thread. Note: You can also start a new conversation by first
      creating a thread.
