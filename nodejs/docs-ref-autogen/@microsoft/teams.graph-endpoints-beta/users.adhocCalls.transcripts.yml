  - name: get(any)
    uid: '@microsoft/teams.graph-endpoints-beta.users.adhocCalls.transcripts.get'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET
      /users/{user-id}/adhocCalls/{adhocCall-id}/transcripts/{callTranscript-id}`


      Retrieve a callTranscript object associated with a scheduled onlineMeeting
      and an ad hoc call. This API supports the retrieval of call transcripts
      from private chat meetings and channel meetings, and ad hoc calls
      including PSTN, 1:1, and group calls. Private channel meetings are not
      supported.  Retrieving the transcript returns the metadata of the single
      transcript associated with an online meeting or an ad hoc call. Retrieving
      the content of the transcript returns the stream of text associated with
      the transcript.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function get(params?: any): EndpointRequest<IEndpoints["GET
