  - name: >-
      create(Operation<"/organization/{organization-id}/branding/localizations",
      "post">, any)
    uid: >-
      @microsoft/teams.graph-endpoints-beta.organization.branding.localizations.create
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `POST /organization/{organization-id}/branding/localizations`


      Create a new organizationalBrandingLocalization object. This creates a
      localized branding and at the same time, the default branding if it
      doesn&#x27;t exist. The default branding is created only once. It&#x27;s
      loaded when a localized branding isn&#x27;t configured for the user&#x27;s
      browser language. To retrieve the default branding, see Get branding.
    remarks: ''
    isDeprecated: false
