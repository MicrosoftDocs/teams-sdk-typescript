      `POST /directory/authenticationMethodDevices/hardwareOathDevices`


      Create a new hardwareOathTokenAuthenticationMethodDevice object. This API
      supports two scenarios:

      - Create the new hardware token without assigning to a user. You can then
      assign to a user.

      - Create and assign a hardware token to a user in the same request.
