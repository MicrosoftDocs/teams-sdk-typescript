    summary: >-
      `GET
      /teamwork/teamTemplates/{teamTemplate-id}/definitions/{teamTemplateDefinition-id}/teamDefinition/owners/{user-id}`


      The list of this team&#x27;s owners. Currently, when creating a team using
      application permissions, exactly one owner must be specified. When using
      user-delegated permissions, no owner can be specified (the current user is
      the owner). The owner must be specified as an object ID (GUID), not a UPN.
