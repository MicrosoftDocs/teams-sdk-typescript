    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `DELETE /me/events/{event-id}`


      Removes the specified event from the containing calendar.  If the event is
      a meeting, deleting the event on the organizer&#x27;s calendar sends a
      cancellation message to the meeting attendees.
    remarks: ''
    isDeprecated: false
