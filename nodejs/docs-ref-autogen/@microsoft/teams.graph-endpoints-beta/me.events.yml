functions:
  - name: create(Operation<"/me/events", "post">)
    uid: '@microsoft/teams.graph-endpoints-beta.me.events.create'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `POST /me/events`


      Create an event in the user&#x27;s default calendar or specified calendar.
      By default, the allowNewTimeProposals property is set to true when an
      event is created, which means invitees can propose a different date/time
      for the event. See Propose new meeting times for more information on how
      to propose a time, and how to receive and accept a new time proposal. You
      can specify the time zone for each of the start and end times of the event
      as part of their values, because the

      start and end properties are of dateTimeTimeZone type. First find the
      supported time zones to make sure you set only time zones that have been
      configured for the user&#x27;s mailbox server. When an event is sent, the
      server sends invitations to all the attendees. Setting the location in an
      event An Exchange administrator can set up a mailbox and an email address
      for a resource such as a meeting room, or equipment

      like a projector. Users can then invite the resource as an attendee to a
      meeting. On behalf of the resource, the server accepts or rejects

      the meeting request based on the free/busy schedule of the resource.

      If the server accepts a meeting for the resource, it creates an event for
      the meeting in the resource&#x27;s calendar. If the meeting is
      rescheduled,

      the server automatically updates the event in the resource&#x27;s
      calendar. Another advantage of setting up a mailbox for a resource is to
      control scheduling of the resource, for example, only executives

      or their delegates can book a private meeting room. If you&#x27;re
      organizing an event that involves a meeting location: Additionally, if the
      meeting location has been set up as a resource, or if the event involves
      some equipment that has been set up as a resource:
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function create(body: Operation<"/me/events", "post">):
        EndpointRequest<IEndpoints["POST /me/events"]["response"]>
      parameters:
        - id: body
          type: Operation&lt;"/me/events", "post"&gt;
          description: ''
      return:
        description: ''
        type: EndpointRequest&lt;IEndpoints["POST /me/events"]["response"]&gt;
