functions:
  - name: create(Operation<"/subscriptions", "post">)
    uid: '@microsoft/teams.graph-endpoints-beta.subscriptions.create'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `POST /subscriptions`


      Subscribes a listener application to receive change notifications when the
      requested type of changes occur to the specified resource in Microsoft
      Graph. To identify the resources for which you can create subscriptions
      and the limitations on subscriptions, see Set up notifications for changes
      in resource data: Supported resources. Some resources support rich
      notifications, that is, notifications that include resource data. For more
      information about these resources, see Set up change notifications that
      include resource data: Supported resources.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function create(body: Operation<"/subscriptions", "post">):
        EndpointRequest<IEndpoints["POST /subscriptions"]["response"]>
