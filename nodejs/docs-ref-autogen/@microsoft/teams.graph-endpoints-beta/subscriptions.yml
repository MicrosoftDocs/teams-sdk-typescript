  - name: update(Operation<"/subscriptions/{subscription-id}", "patch">, any)
    uid: '@microsoft/teams.graph-endpoints-beta.subscriptions.update'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `PATCH /subscriptions/{subscription-id}`


      Renew a subscription by extending its expiry time. The table in the
      Permissions section lists the resources that support subscribing to change
      notifications. Subscriptions expire after a length of time that varies by
      resource type. In order to avoid missing change notifications, an app
      should renew its subscriptions well in advance of their expiry date. See
      subscription for maximum length of a subscription for each resource type.
    remarks: ''
    isDeprecated: false
