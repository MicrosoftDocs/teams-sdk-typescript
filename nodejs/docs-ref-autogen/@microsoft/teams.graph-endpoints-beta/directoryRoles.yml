  - name: get(any)
    uid: '@microsoft/teams.graph-endpoints-beta.directoryRoles.get'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET /directoryRoles/{directoryRole-id}`


      Retrieve the properties of a directoryRole object. You can use both the
      object ID and template ID of the directoryRole with this API. The template
      ID of a built-in role is immutable and can be seen in the role description
      on the Microsoft Entra admin center. For details, see Role template IDs.
    remarks: ''
    isDeprecated: false
