  - name: get(any)
    uid: '@microsoft/teams.graph-endpoints-beta.users.adhocCalls.recordings.get'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET
      /users/{user-id}/adhocCalls/{adhocCall-id}/recordings/{callRecording-id}`


      Get a callRecording object associated with a scheduled online meeting and
      an ad hoc call. This API supports the retrieval of call recordings from
      private chat meetings, channel meetings, ad hoc calls, including PSTN,
      1:1, and group calls. Private channel meetings are not supported. For a
      recording, this API returns the metadata of the single recording
      associated with the online meeting or an ad hoc call. For the content of a
      recording, this API returns the stream of bytes associated with the
      recording.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function get(params?: any): EndpointRequest<IEndpoints["GET
