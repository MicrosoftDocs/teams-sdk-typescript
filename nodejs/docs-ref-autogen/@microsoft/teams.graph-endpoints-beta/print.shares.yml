    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `PATCH /print/shares/{printerShare-id}`


      Update the properties of a printer share. This method can be used to swap
      printers. For example, if a physical printer device breaks, an
      administrator can register a new printer device and update this
      printerShare to point to the new printer without requiring users to take
      any action.
