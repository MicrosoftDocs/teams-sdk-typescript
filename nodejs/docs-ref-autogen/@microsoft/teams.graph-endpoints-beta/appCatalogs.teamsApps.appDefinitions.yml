  - name: >-
      create(Operation<"/appCatalogs/teamsApps/{teamsApp-id}/appDefinitions",
      "post">, any)
    uid: >-
      @microsoft/teams.graph-endpoints-beta.appCatalogs.teamsApps.appDefinitions.create
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `POST /appCatalogs/teamsApps/{teamsApp-id}/appDefinitions`


      Update an app previously published to the Microsoft Teams app catalog. To
      update an app, the distributionMethod property for the app must be set to
      organization. This API specifically updates an app published to your
      organization&#x27;s app catalog (the tenant app catalog).
    remarks: ''
