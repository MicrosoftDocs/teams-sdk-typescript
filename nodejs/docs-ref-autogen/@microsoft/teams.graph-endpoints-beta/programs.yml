  - name: del(any)
    uid: '@microsoft/teams.graph-endpoints-beta.programs.del'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `DELETE /programs/{program-id}`


      In the Microsoft Entra access reviews feature, delete a program object. Do
      not delete a program which still has programControl linked to it, those
      access reviews should first be deleted or unlinked from the program and
      linked to a different program.  Also, please note that the built-in
      default program cannot be deleted.
    remarks: ''
