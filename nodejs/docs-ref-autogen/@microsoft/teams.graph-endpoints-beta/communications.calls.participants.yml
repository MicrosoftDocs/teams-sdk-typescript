  - name: del(any)
    uid: >-
      @microsoft/teams.graph-endpoints-beta.communications.calls.participants.del
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `DELETE /communications/calls/{call-id}/participants/{participant-id}`


      Delete a specific participant in a call. In some situations, it is
      appropriate for an application to remove a participant from an active
      call. This action can be done before or after the participant answers the
      call. When an active caller is removed, they are immediately dropped from
      the call with no pre- or post-removal notification. When an invited
      participant is removed, any outstanding add participant request is
      canceled.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function del(params?: any): EndpointRequest<IEndpoints["DELETE
