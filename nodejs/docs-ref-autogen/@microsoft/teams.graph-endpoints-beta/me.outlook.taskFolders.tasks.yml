  - name: list(any)
    uid: '@microsoft/teams.graph-endpoints-beta.me.outlook.taskFolders.tasks.list'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET /me/outlook/taskFolders/{outlookTaskFolder-id}/tasks`


      Get all the Outlook tasks in the specified folder. By default, this
      operation (and the POST, PATCH, and complete task operations) returns

      date-related properties in UTC.  You can use a Prefer: outlook.timezone
      request header to have all the date-related properties in the response
      represented in a time zone

      different than UTC. See an example for getting a single task. You can
      apply the header similarly to get multiple tasks. If there is more than
      one task group, and you want to get all the tasks in a specific task
      group, first

      get all the task folders in that task group,

      and then get the tasks in each of these task folders.
    remarks: ''
    isDeprecated: true
    customDeprecatedMessage: ''
    syntax:
      content: >-
