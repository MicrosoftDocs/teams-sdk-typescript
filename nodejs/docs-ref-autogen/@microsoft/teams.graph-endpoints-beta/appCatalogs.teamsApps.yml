    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET /appCatalogs/teamsApps`


      List apps from the Microsoft Teams app catalog, including apps from the
      Microsoft Teams store and apps from your organization&#x27;s app catalog
      (the tenant app catalog). To get apps from your organization&#x27;s app
      catalog only, specify organization as the distributionMethod in the
