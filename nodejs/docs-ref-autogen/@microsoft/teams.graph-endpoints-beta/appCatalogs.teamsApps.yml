    uid: '@microsoft/teams.graph-endpoints-beta.appCatalogs.teamsApps.create'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `POST /appCatalogs/teamsApps`


      Publish an app to the Microsoft Teams app catalog.

      Specifically, this API publishes the app to your organization&#x27;s
      catalog (the tenant app catalog);

      the created resource has a distributionMethod property value of
      organization. The requiresReview property allows any user to submit an app
      for review by an administrator. Admins can approve or reject these apps
      via this API or the Microsoft Teams admin center.
    remarks: ''
    isDeprecated: false
