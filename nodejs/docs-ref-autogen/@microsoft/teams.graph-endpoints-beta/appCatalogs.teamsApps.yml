  - name: del(any)
    uid: '@microsoft/teams.graph-endpoints-beta.appCatalogs.teamsApps.del'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `DELETE /appCatalogs/teamsApps/{teamsApp-id}`


      Delete an app from an organization&#x27;s app catalog (the tenant app
      catalog). To delete an app, the distributionMethod property for the app
      must be set to organization. You can also use this API to remove a
      submitted app from the review process.
