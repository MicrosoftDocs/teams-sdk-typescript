    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET /me/outlook/tasks`


      Get all the Outlook tasks in the user&#x27;s mailbox. By default, this
      operation (and the POST, PATCH, and complete task operations) returns
      date-related properties in UTC.

      You can use the Prefer: outlook.timezone header to have all the
      date-related properties in the response represented in a time zone

      different than UTC. See an example for getting a single task. You can
      apply the header similarly to get multiple tasks.
