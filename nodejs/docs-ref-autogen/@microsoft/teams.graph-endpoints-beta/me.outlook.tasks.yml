  - name: update(Operation<"/me/outlook/tasks/{outlookTask-id}", "patch">, any)
    uid: '@microsoft/teams.graph-endpoints-beta.me.outlook.tasks.update'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `PATCH /me/outlook/tasks/{outlookTask-id}`


      Change writable properties of an Outlook task. The completedDateTime
      property can be set by the complete action, or explicitly by a PATCH
      operation. If you use PATCH to set completedDateTime, make sure you set
      status to completed as well. By default, this operation (and the POST,
      GET, and complete task operations) returns date-related properties in UTC.
      You can use the Prefer: outlook.timezone header to have all the
      date-related properties in the response represented in a time zone
      different than UTC.
