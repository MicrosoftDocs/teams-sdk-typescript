functions:
  - name: create(Operation<"/me/outlook/tasks", "post">)
    uid: '@microsoft/teams.graph-endpoints-beta.me.outlook.tasks.create'
    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `POST /me/outlook/tasks`


      Create an Outlook task in the default task group (My Tasks) and default
      task folder (Tasks) in the user&#x27;s mailbox. The POST method always
      ignores the time portion of startDateTime and dueDateTime in the request
      body, and assumes the time

      to be always midnight in the specified time zone. By default, this
      operation (and the GET, PATCH, and complete task operations) returns
      date-related properties in UTC.

      You can use the Prefer: outlook.timezone header to have all the
      date-related properties in the response represented in a time zone

      different than UTC.
    remarks: ''
    isDeprecated: true
