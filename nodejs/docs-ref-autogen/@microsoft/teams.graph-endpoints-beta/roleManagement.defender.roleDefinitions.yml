    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `POST /roleManagement/defender/roleDefinitions`


      Create a new unifiedRoleDefinition object for an RBAC provider. This
      feature requires a Microsoft Entra ID P1 or P2 license. The following RBAC
      providers are currently supported:

      - Cloud PC

      - device management (Intune)

      - Defender (Microsoft Defender XDR)

      - directory (Microsoft Entra ID)
