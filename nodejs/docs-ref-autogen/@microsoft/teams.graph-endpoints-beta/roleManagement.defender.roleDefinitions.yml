    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `DELETE
      /roleManagement/defender/roleDefinitions/{unifiedRoleDefinition-id}`


      Delete a unifiedRoleDefinition object for an RBAC provider. You cannot
      delete built-in roles. This feature requires a Microsoft Entra ID P1 or P2
      license. The following RBAC providers are currently supported:

      - Cloud PC

      - device management (Intune)

      - Defender (Microsoft Defender XDR Unified RBAC)

      - directory (Microsoft Entra ID)
