    package: '@microsoft/teams.graph-endpoints-beta'
    summary: >-
      `GET
      /identityGovernance/accessReviews/definitions/{accessReviewScheduleDefinition-id}`


      Retrieve an accessReviewScheduleDefinition object by ID. This returns all
      properties of the scheduled access review series except for the associated
      accessReviewInstances. Each accessReviewScheduleDefinition has at least
      one instance. An instance represents a review for a specific resource
      (such as a particular group&#x27;s members), during one occurrence (for
      example, March 2021) of a recurring review. To retrieve the instances of
      the access review series, use the list accessReviewInstance API.
    remarks: ''
    isDeprecated: false
    syntax:
