  - name: get(any)
    uid: '@microsoft/teams.graph-endpoints.auditLogs.signIns.get'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET /auditLogs/signIns/{signIn-id}`


      Retrieve a specific Microsoft Entra user sign-in event for your tenant.
      Sign-ins that are interactive in nature (where a username/password is
      passed as part of auth token) and successful federated sign-ins are
      currently included in the sign-in logs.
