    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `PUT /groups/{group-id}/team`


      Create a new team under a group. In order to create a team, the group must
      have at least one owner. If the group was created less than 15 minutes
      ago, calls to create a team might fail with a 404 Not Found error code
      because the group information didn&#x27;t fully replicate.
