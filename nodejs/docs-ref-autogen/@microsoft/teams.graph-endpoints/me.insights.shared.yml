    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET /me/insights/shared`


      Calculated insight that includes the list of documents shared with a user.
      This insight includes documents hosted on OneDrive/SharePoint in the
      user&#x27;s Microsoft 365 tenant that are shared with the user, and
      documents that are attached as files and sent to the user.
