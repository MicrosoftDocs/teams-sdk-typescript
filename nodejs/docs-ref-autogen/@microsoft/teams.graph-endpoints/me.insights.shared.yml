    summary: >-
      `GET /me/insights/shared/{sharedInsight-id}`


      Calculated relationship that identifies documents shared with or by the
      user. This includes URLs, file attachments, and reference attachments to
      OneDrive for work or school and SharePoint files found in Outlook messages
      and meetings. This also includes URLs and reference attachments to Teams
      conversations. Ordered by recency of share.
