    uid: '@microsoft/teams.graph-endpoints.organization.branding.del'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `DELETE /organization/{organization-id}/branding`


      Delete the default organizational branding object. To delete the
      organizationalBranding object, all images (Stream types) must first be
      removed from the object.
