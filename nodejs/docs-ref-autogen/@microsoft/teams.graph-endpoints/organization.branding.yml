  - name: get(any)
    uid: '@microsoft/teams.graph-endpoints.organization.branding.get'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET /organization/{organization-id}/branding`


      Retrieve the default organizational branding object, if the
      Accept-Language header is set to 0 or default. If no default
      organizational branding object exists, this method returns a 404 Not Found
      error. If the Accept-Language header is set to an existing locale
      identified by the value of its id, this method retrieves the branding for
      the specified locale. This method retrieves only non-Stream properties,
      for example, usernameHintText and signInPageText. To retrieve Stream types
      of the default branding, for example, bannerLogo and backgroundImage, use
      the GET organizationalBrandingLocalization method.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function get(params?: any): EndpointRequest<IEndpoints["GET
        /organization/{organization-id}/branding"]["response"]>
      parameters:
        - id: params
          type: any
          description: ''
      return:
        description: ''
        type: >-
          EndpointRequest&lt;IEndpoints["GET
          /organization/{organization-id}/branding"]["response"]&gt;
