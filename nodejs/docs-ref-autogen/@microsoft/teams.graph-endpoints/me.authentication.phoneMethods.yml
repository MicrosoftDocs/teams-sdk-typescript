  - name: del(any)
    uid: '@microsoft/teams.graph-endpoints.me.authentication.phoneMethods.del'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `DELETE /me/authentication/phoneMethods/{phoneAuthenticationMethod-id}`


      Delete a user&#x27;s phone authentication method. This removes the phone
      number from the user and they&#x27;ll no longer be able to use the number
      for authentication, whether via SMS or voice calls. A user can&#x27;t have
      an alternateMobile number without a mobile number. If you want to remove a
      mobile number from a user that also has an alternateMobile number, first
      update the mobile number to the new number, then delete the
      alternateMobile number. If the phone number is the user&#x27;s default
      Azure multi-factor authentication (MFA) authentication method, it
      can&#x27;t be deleted. Have the user change their default authentication
      method, and then delete the number.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function del(params?: any): EndpointRequest<IEndpoints["DELETE
