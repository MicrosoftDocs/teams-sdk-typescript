  - name: get(any)
    uid: '@microsoft/teams.graph-endpoints.me.insights.used.get'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET /me/insights/used`


      Calculate and list the documents that a user has viewed or modified.  For
      the signed-in user:

      - This method includes documents that the user has modified; see example
      1.

      - Using an $orderby query parameter on the lastAccessedDateTime property
      returns the most recently viewed documents that the user might or might
      not not have modified; see example 2. For other users, this method
      includes only documents that the user has modified.
    remarks: ''
    isDeprecated: false
