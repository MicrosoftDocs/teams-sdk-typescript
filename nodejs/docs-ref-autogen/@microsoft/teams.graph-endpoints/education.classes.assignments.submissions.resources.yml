  - name: del(any)
    uid: >-
      @microsoft/teams.graph-endpoints.education.classes.assignments.submissions.resources.del
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `DELETE
      /education/classes/{educationClass-id}/assignments/{educationAssignment-id}/submissions/{educationSubmission-id}/resources/{educationSubmissionResource-id}`


      Delete an educationSubmissionResource from the submission. Only teachers
      and students can perform this operation. If the resource was copied from
      the assignment, a new copy of the resource will be created after the
      current copy is deleted. This allows you to &#x27;reset&#x27; the resource
      to its original state. If the resource wasn&#x27;t copied from the
      assignment but was added from the student, the resource is deleted.
    remarks: ''
