  - name: list(any)
    uid: >-
      @microsoft/teams.graph-endpoints.education.classes.assignments.submissions.resources.list
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET
      /education/classes/{educationClass-id}/assignments/{educationAssignment-id}/submissions/{educationSubmission-id}/resources`


      List the resources associated with a submission. Only teachers, students,
      and applications with application permissions can perform this operation.
      The educationSubmissionResource object is a wrapper around the actual
      resource object the student is working on. The wrapper also includes a
      pointer to the resources on the assignment if this resource was copied
      from the assignment during the assign process. These resources are the
      working copy of the assignment. The submittedResources are the resources
      that were officially submitted for grading.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
