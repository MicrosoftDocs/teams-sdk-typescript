    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET
      /education/classes/{educationClass-id}/assignments/{educationAssignment-id}/submissions/{educationSubmission-id}/resources/{educationSubmissionResource-id}`


      Retrieve the properties of a specific resource associated with a
      submission. Only teachers, students, and applications with application
      permissions can perform this operation. This resource is in the
      &#x27;working&#x27; resource list and should be considered work in process
      by a student. This resource is wrapped with a possible pointer back to the
      assignment resource if it was copied from the assignment.
    remarks: ''
