    summary: >-
      `GET /education/classes/{educationClass-id}`


      Retrieve a class from the system. A class is a universal group with a
      special property that indicates to the system that the group is a class.
      Group members represent the students; group admins represent the teachers
      in the class. If you&#x27;re using the delegated token, the user will only
      see classes in which they are members.
