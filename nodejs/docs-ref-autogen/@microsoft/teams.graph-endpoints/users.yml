  - name: del(any)
    uid: '@microsoft/teams.graph-endpoints.users.del'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `DELETE /users/{user-id}`


      Delete a user object.   When deleted, user resources, including their
      mailbox and license assignments, are moved to a temporary container and if
      the user is restored within 30 days, these objects are restored to them.
      The user is also restored to any groups they were a member of. After 30
      days and if not restored, the user object is permanently deleted and their
      assigned resources freed. To manage the deleted user object, see
      deletedItems.
    remarks: ''
    isDeprecated: false
