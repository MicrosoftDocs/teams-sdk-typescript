    uid: '@microsoft/teams.graph-endpoints.teams.schedule.get'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET /teams/{team-id}/schedule`


      Retrieve the properties and relationships of a schedule object. The
      schedule creation process conforms to the One API guideline for resource
      based long running operations (RELO).

      When clients use the PUT method, if the schedule is provisioned, the
      operation updates the schedule; otherwise, the operation starts the
      schedule provisioning process in the background. During schedule
      provisioning, clients can use the GET method to get the schedule and look
      at the provisionStatus property for the current state of the provisioning.
      If the provisioning failed, clients can get additional information from
      the provisionStatusCode property. Clients can also inspect the
      configuration of the schedule.
    remarks: ''
