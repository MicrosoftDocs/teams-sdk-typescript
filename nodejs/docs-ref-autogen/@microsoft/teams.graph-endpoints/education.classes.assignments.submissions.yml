    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET
      /education/classes/{educationClass-id}/assignments/{educationAssignment-id}/submissions`


      List all the submissions associated with an assignment. Only teachers,
      students, and applications with application permissions can perform this
      operation. A teacher or an application with application permissions can
      get all the submissions while a student can only get submissions that
      they&#x27;re associated with.
