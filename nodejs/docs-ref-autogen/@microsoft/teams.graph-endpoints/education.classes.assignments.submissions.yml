  - name: get(any)
    uid: >-
      @microsoft/teams.graph-endpoints.education.classes.assignments.submissions.get
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET
      /education/classes/{educationClass-id}/assignments/{educationAssignment-id}/submissions/{educationSubmission-id}`


      Retrieve a particular submission. Only teachers, students, and
      applications with application permissions can perform this operation. A
      submission object represents a student&#x27;s work for an assignment.
      Resources associated with the submission represent this work. Only the
      assignedTo student can see and modify the submission. A teacher or
      application with application permissions has full access to all
      submissions. The grade and feedback from a teacher are part of the
      educationOutcome associated with this object. Only teachers or
      applications with application permissions can add or change grades and
      feedback. Students will not see the grade or feedback until the assignment
      has been released.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function get(params?: any): EndpointRequest<IEndpoints["GET
        /education/classes/{educationClass-id}/assignments/{educationAssignment-id}/submissions/{educationSubmission-id}"]["response"]>
