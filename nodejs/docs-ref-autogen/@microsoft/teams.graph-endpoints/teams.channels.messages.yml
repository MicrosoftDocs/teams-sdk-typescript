  - name: >-
      update(Operation<"/teams/{team-id}/channels/{channel-id}/messages/{chatMessage-id}",
      "patch">, any)
    uid: '@microsoft/teams.graph-endpoints.teams.channels.messages.update'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `PATCH /teams/{team-id}/channels/{channel-id}/messages/{chatMessage-id}`


      Update a chatMessage object.

      Except for the policyViolation property, all properties of a chatMessage
      can be updated in delegated permissions scenarios.

      Only the policyViolation property of a chatMessage can be updated in
      application permissions scenarios. The update only works for chats where
      members are Microsoft Teams users. If one of the participants is using
      Skype, the operation fails. This method doesn&#x27;t support federation.
      Only the user in the tenant who sent the message can perform data loss
      prevention (DLP) updates on the specified chat message.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function update(body:
        Operation<"/teams/{team-id}/channels/{channel-id}/messages/{chatMessage-id}",
        "patch">, params?: any): EndpointRequest<IEndpoints["PATCH
