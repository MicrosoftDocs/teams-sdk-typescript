  - name: list(any)
    uid: '@microsoft/teams.graph-endpoints.teams.channels.messages.list'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET /teams/{team-id}/channels/{channel-id}/messages`


      Retrieve the list of messages (without the replies) in a channel of a
      team.  To get the replies for a message, call the list message replies or
      the get message reply API.  This method supports federation. To list
      channel messages in application context, the request must be made from the
      tenant that the channel owner belongs to (represented by the tenantId
      property on the channel).
    remarks: ''
    isDeprecated: false
