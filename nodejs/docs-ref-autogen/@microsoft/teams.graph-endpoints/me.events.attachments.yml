    uid: '@microsoft/teams.graph-endpoints.me.events.attachments.create'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `POST /me/events/{event-id}/attachments`


      Use this API to add an attachment to an existing event. This operation
      limits the size of the attachment you can add to under 3 MB. If an
      organizer adds an attachment to a meeting event, the organizer can
      subsequently update the event to send the attachment and update the event
      for each attendee as well.
    remarks: ''
