    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET /me/insights/trending/{trending-id}`


      Calculated relationship that identifies documents trending around a user.
      Trending documents are calculated based on activity of the user&#x27;s
      closest network of people and include files stored in OneDrive for work or
      school and SharePoint. Trending insights help the user to discover
      potentially useful content that the user has access to, but has never
      viewed before.
    remarks: ''
