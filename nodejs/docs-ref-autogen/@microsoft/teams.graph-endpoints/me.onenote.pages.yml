functions:
  - name: create(Operation<"/me/onenote/pages", "post">)
    uid: '@microsoft/teams.graph-endpoints.me.onenote.pages.create'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `POST /me/onenote/pages`


      Create a new OneNote page in the default section of the default notebook.
      To create a page in a different section in the default notebook, you can
      use the sectionName query parameter.  Example:
      ../onenote/pages?sectionName&#x3D;My%20section The POST /onenote/pages
      operation is used only to create pages in the current user&#x27;s default
      notebook. If you&#x27;re targeting other notebooks, you can create pages
      in a specified section.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function create(body: Operation<"/me/onenote/pages", "post">):
