  - name: list(any)
    uid: '@microsoft/teams.graph-endpoints.me.onlineMeetings.transcripts.list'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET /me/onlineMeetings/{onlineMeeting-id}/transcripts`


      Retrieve a callTranscript object associated with a scheduled
      onlineMeeting. This API supports the retrieval of call transcripts from
      private chat meetings and channel meetings. However, private channel
      meetings are not supported at this time. Retrieving the transcript returns
      the metadata of the single transcript associated with the online meeting.
      Retrieving the content of the transcript returns the stream of text
      associated with the transcript.
    remarks: ''
    isDeprecated: false
