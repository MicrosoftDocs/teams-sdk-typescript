    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET /directory/deletedItems/{directoryObject-id}`


      Retrieve the properties of a recently deleted application, group,
      servicePrincipal, administrative unit, or user object from deleted items.
      Retrieve the properties of a recently deleted directory object from
      deleted items. The following types are supported:

      - administrativeUnit

      - application

      - certificateBasedAuthPki

      - certificateAuthorityDetail

      - group

      - servicePrincipal

      - user
