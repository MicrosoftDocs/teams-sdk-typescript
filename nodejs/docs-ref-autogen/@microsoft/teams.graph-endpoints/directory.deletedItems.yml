functions:
  - name: del(any)
    uid: '@microsoft/teams.graph-endpoints.directory.deletedItems.del'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `DELETE /directory/deletedItems/{directoryObject-id}`


      Permanently delete a recently deleted application, group,
      servicePrincipal, or user object from deleted items. After an item is
      permanently deleted, it cannot be restored. Permanently delete a recently
      deleted directory object from deleted items. The following types are
      supported:

      - certificateBasedAuthPki

      - certificateAuthorityDetail After an item is permanently deleted, it
      cannot be restored. Administrative units cannot be permanently deleted by
      using the deletedItems API. Soft-deleted administrative units will be
      permanently deleted 30 days after initial deletion unless they are
      restored.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function del(params?: any): EndpointRequest<IEndpoints["DELETE
        /directory/deletedItems/{directoryObject-id}"]["response"]>
      parameters:
        - id: params
          type: any
          description: ''
      return:
        description: ''
        type: >-
          EndpointRequest&lt;IEndpoints["DELETE
          /directory/deletedItems/{directoryObject-id}"]["response"]&gt;
  - name: get(any)
