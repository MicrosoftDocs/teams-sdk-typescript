    summary: >-
      `GET /communications/callRecords/{callRecord-id}/sessions`


      Retrieve the list of sessions associated with a callRecord object. If the
      sessions list is truncated, a sessions@odata.nextLink value will be
      provided to retrieve the next page of sessions. The maximum page size for
      sessions is 60 entries.
