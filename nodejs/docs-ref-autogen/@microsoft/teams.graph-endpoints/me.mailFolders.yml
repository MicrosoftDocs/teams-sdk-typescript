    uid: '@microsoft/teams.graph-endpoints.me.mailFolders.create'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `POST /me/mailFolders`


      Use this API to create a new mail folder in the root folder of the
      user&#x27;s mailbox. If you intend a new folder to be hidden, you must set
      the isHidden property to true on creation.
    remarks: ''
    isDeprecated: false
