  - name: list(any)
    uid: '@microsoft/teams.graph-endpoints.me.mailFolders.list'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET /me/mailFolders`


      Get the mail folder collection directly under the root folder of the
      signed-in user. The returned collection includes any mail search folders
      directly under the root. By default, this operation does not return hidden
      folders. Use a query parameter includeHiddenFolders to include them in the
      response. This operation does not return all mail folders in a mailbox,
      only the child folders of the root folder. To return all mail folders in a
      mailbox, each child folder must be traversed separately.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function list(params?: any): EndpointRequest<IEndpoints["GET
