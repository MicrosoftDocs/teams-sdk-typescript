functions:
  - name: >-
      create(Operation<"/users/{user-id}/authentication/phoneMethods", "post">,
      any)
    uid: '@microsoft/teams.graph-endpoints.users.authentication.phoneMethods.create'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `POST /users/{user-id}/authentication/phoneMethods`


      Add a new phone authentication method for a user. A user may only have one
      phone of each type, captured in the phoneType property. This means, for
      example, adding a mobile phone to a user with a pre-existing mobile phone
      fails. Additionally, a user must always have a mobile phone before adding
      an alternateMobile phone. Adding a phone number makes it available for use
      in both Azure multi-factor authentication (MFA) and self-service password
      reset (SSPR), if enabled. Additionally, if a user is enabled by policy to
      use SMS sign-in and a mobile number is added, the system attempts to
      register the number for use in that system.
    remarks: ''
