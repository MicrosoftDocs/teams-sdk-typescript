  - name: >-
      update(Operation<"/users/{user-id}/authentication/phoneMethods/{phoneAuthenticationMethod-id}",
      "patch">, any)
    uid: '@microsoft/teams.graph-endpoints.users.authentication.phoneMethods.update'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `PATCH
      /users/{user-id}/authentication/phoneMethods/{phoneAuthenticationMethod-id}`


      Update a user&#x27;s phone number associated with a phone authentication
      method object. You can&#x27;t change a phone&#x27;s type. To change a
      phone&#x27;s type, add a new number of the desired type and then delete
      the object with the original type. If a user is enabled by policy to use
      SMS to sign in and the mobile number is changed, the system will attempt
      to register the number for use in that system. Self-service operations
      aren&#x27;t supported.
    remarks: ''
