    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET /print/printers/{printer-id}/taskTriggers`


      Retrieve a list of task triggers associated with the printer. The list of
      task triggers defines which tasks will be triggered as a result of events
      that occur during printing. For details about how to use this API to add
      pull printing support to Universal Print, see Extending Universal Print to
