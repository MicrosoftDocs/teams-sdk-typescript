    summary: >-
      `GET /roleManagement/directory/roleAssignmentScheduleRequests`


      Retrieve the requests for active role assignments to principals. The
      active assignments include those made through assignments and activation
      requests, and directly through the role assignments API. The role
      assignments can be permanently active with or without an expiry date, or
      temporarily active after user activation of eligible assignments.
