    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET
      /servicePrincipals/{servicePrincipal-id}/remoteDesktopSecurityConfiguration`


      Read the properties and relationships of a
      remoteDesktopSecurityConfiguration object on a servicePrincipal. Use this
      configuration to view the Microsoft Entra ID Remote Desktop Services (RDS)
      authentication protocol to authenticate a user to Microsoft Entra joined
      or Microsoft Entra hybrid joined devices. Additionally you can view any
      targetDeviceGroups that have been configured for SSO.
