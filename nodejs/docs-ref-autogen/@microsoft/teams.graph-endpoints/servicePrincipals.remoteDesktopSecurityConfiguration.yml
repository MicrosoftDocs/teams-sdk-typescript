    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `DELETE
      /servicePrincipals/{servicePrincipal-id}/remoteDesktopSecurityConfiguration`


      Delete a remoteDesktopSecurityConfiguration object on a servicePrincipal.
      Removing remoteDesktopSecurityConfiguration object on the servicePrincipal
      disables the Microsoft Entra ID Remote Desktop Services (RDS)
      authentication protocol to authenticate a user to Microsoft Entra joined
      or Microsoft Entra hybrid joined devices, and removes any target device
      groups that you configured for SSO.
    remarks: ''
    isDeprecated: false
