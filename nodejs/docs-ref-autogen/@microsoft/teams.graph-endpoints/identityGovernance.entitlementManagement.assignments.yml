  - name: list(any)
    uid: >-
      @microsoft/teams.graph-endpoints.identityGovernance.entitlementManagement.assignments.list
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET /identityGovernance/entitlementManagement/assignments`


      In Microsoft Entra entitlement management, retrieve a list of
      accessPackageAssignment objects. For directory-wide administrators, the
      resulting list includes all the assignments, current and well as expired,
      that the caller has access to read, across all catalogs and access
      packages.  If the caller is on behalf of a delegated user who is assigned
      only to catalog-specific delegated administrative roles, the request must
      supply a filter to indicate a specific access package, such as:
      $filter&#x3D;accessPackage/id eq
      &#x27;a914b616-e04e-476b-aa37-91038f0b165b&#x27;.
    remarks: ''
    isDeprecated: false
