  - name: list(any)
    uid: '@microsoft/teams.graph-endpoints.me.onlineMeetings.recordings.list'
    package: '@microsoft/teams.graph-endpoints'
    summary: >-
      `GET /me/onlineMeetings/{onlineMeeting-id}/recordings`


      Get a callRecording object associated with a scheduled onlineMeeting. This
      API supports the retrieval of call recordings from private chat meetings
      and channel meetings. However, private channel meetings are not supported
      at this time. For a recording, this API returns the metadata of the single
      recording associated with the online meeting. For the content of a
      recording, this API returns the stream of bytes associated with the
      recording.
    remarks: ''
    isDeprecated: false
