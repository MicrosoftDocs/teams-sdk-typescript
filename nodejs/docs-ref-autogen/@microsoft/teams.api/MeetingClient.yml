  - name: sendNotification(string, MeetingNotificationParams)
    uid: '@microsoft/teams.api.MeetingClient.sendNotification'
    package: '@microsoft/teams.api'
    summary: >-
      Send a targeted in-meeting notification to specific participants.


      Returns `undefined` on full success (HTTP 202). Returns a
      `MeetingNotificationResponse`

      with per-recipient failure info on partial success (HTTP 207).


      Requires the RSC permission `OnlineMeetingNotification.Send.Chat` and the
      ECS flag

      enabled for the tenant/bot.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function sendNotification(meetingId: string, params:
        MeetingNotificationParams): Promise<undefined |
        MeetingNotificationResponse>
      parameters:
        - id: meetingId
          type: string
          description: The BASE64-encoded meeting ID.
        - id: params
          type: <xref uid="@microsoft/teams.api.MeetingNotificationParams" />
          description: The notification parameters including recipients and surfaces.
      return:
        description: ''
        type: >-
          Promise&lt;undefined | <xref
          uid="@microsoft/teams.api.MeetingNotificationResponse" />&gt;
