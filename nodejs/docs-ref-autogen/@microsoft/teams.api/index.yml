  - name: resolveAadObjectId(any)
    uid: '@microsoft/teams.api.resolveAadObjectId'
    package: '@microsoft/teams.api'
    summary: >-
      The backend inconsistently populates either `objectId` or `aadObjectId`
      depending on the endpoint:

      - `GET /v3/conversations/{id}/members` (non-paginated) → `objectId`

      - `GET /v3/conversations/{id}/members/{memberId}`       → `aadObjectId`

      - `GET /v3/conversations/{id}/pagedMembers`             → `aadObjectId`

      - `GET /v3/conversations/{id}/activities/{id}/members`  → `objectId`


      This function normalizes both into `aadObjectId`.
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'function resolveAadObjectId(data: any): TeamsChannelAccount'
      parameters:
        - id: data
          type: any
          description: ''
      return:
        description: ''
        type: <xref uid="@microsoft/teams.api.TeamsChannelAccount" />
