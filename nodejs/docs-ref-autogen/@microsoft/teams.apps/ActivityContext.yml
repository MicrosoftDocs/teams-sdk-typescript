methods:
  - name: quote(string, ActivityLike)
    uid: '@microsoft/teams.apps.ActivityContext.quote'
    package: '@microsoft/teams.apps'
    summary: >-
      Send a message to the conversation with a quoted message reference
      prepended to the text.

      Teams renders the quoted message as a preview bubble above the response
      text.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function quote(messageId: string, activity: ActivityLike):
        Promise<SentActivity>
      parameters:
        - id: messageId
          type: string
          description: The ID of the message to quote
        - id: activity
          type: <xref uid="@microsoft/teams.api.ActivityLike" />
          description: >-
            The activity to send — a quote placeholder for messageId will be
            prepended to its text

             This API is coming soon and may change in the future.
            Diagnostic: ExperimentalTeamsQuotedReplies
      return:
        description: ''
        type: Promise&lt;<xref uid="@microsoft/teams.api.SentActivity" />&gt;
  - name: reply(ActivityLike)
    uid: '@microsoft/teams.apps.ActivityContext.reply'
    package: '@microsoft/teams.apps'
    summary: >-
      send an activity in the current conversation with a visual quote

      of the inbound message.


      In channels, sends to the current thread with a quoted reply.

      In other scopes, sends with a quoted reply.

      To send without quoting, use
      [send](xref:@microsoft/teams.apps.ActivityContext.send).
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'function reply(activity: ActivityLike): Promise<SentActivity>'
      parameters:
        - id: activity
          type: <xref uid="@microsoft/teams.api.ActivityLike" />
          description: the activity to send
      return:
        description: ''
        type: Promise&lt;<xref uid="@microsoft/teams.api.SentActivity" />&gt;
  - name: send(ActivityLike, ConversationReference)
    uid: '@microsoft/teams.apps.ActivityContext.send'
    package: '@microsoft/teams.apps'
    summary: >-
      send an activity in the current conversation without quoting.


      In channels, sends to the current thread. In scopes that do not

      support threading (group chat, meetings), sends as a normal message.

      To send with a visual quote of the inbound message, use
      [reply](xref:@microsoft/teams.apps.ActivityContext.reply).
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function send(activity: ActivityLike, conversationRef?:
        ConversationReference): Promise<SentActivity>
      parameters:
        - id: activity
          type: <xref uid="@microsoft/teams.api.ActivityLike" />
          description: the activity to send
        - id: conversationRef
          type: <xref uid="@microsoft/teams.api.ConversationReference" />
          description: >-
            optional conversation reference to send to a different conversation
            or thread
      return:
        description: ''
        type: Promise&lt;<xref uid="@microsoft/teams.api.SentActivity" />&gt;
