  - name: reply(string, ActivityLike)
    uid: '@microsoft/teams.apps.App.reply_1'
    package: '@microsoft/teams.apps'
    summary: |-
      send an activity proactively to a conversation.

      Sends to the exact conversation ID provided - threaded if
      it contains `;messageid=`, flat otherwise.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function reply(conversationId: string, activity: ActivityLike):
        Promise<any>
      parameters:
        - id: conversationId
          type: string
          description: the conversation to send to
        - id: activity
          type: <xref uid="@microsoft/teams.api.ActivityLike" />
          description: the activity to send
      return:
        description: ''
        type: Promise&lt;any&gt;
  - name: reply(string, string, ActivityLike)
    uid: '@microsoft/teams.apps.App.reply'
    package: '@microsoft/teams.apps'
    summary: >-
      send an activity proactively as a threaded reply.


      Constructs a threaded conversation ID from the conversation ID

      and message ID via
      [toThreadedConversationId](xref:@microsoft/teams.apps.toThreadedConversationId),
      then sends

      to that thread. The service determines whether threading is

      supported for the given conversation type.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function reply(conversationId: string, messageId: string, activity:
        ActivityLike): Promise<any>
      parameters:
        - id: conversationId
          type: string
          description: the conversation ID
        - id: messageId
          type: string
          description: the thread root message ID
        - id: activity
          type: <xref uid="@microsoft/teams.api.ActivityLike" />
          description: the activity to send
      return:
        description: ''
        type: Promise&lt;any&gt;
  - name: send(string, ActivityLike)
    uid: '@microsoft/teams.apps.App.send'
    package: '@microsoft/teams.apps'
    summary: >-
      send an activity proactively to a conversation.


      Sends to the exact conversation ID provided. For channel threads,

      the conversation ID must include `;messageid=` - use
      [toThreadedConversationId](xref:@microsoft/teams.apps.toThreadedConversationId)

      to construct it, or use [reply](xref:@microsoft/teams.apps.App.reply_1)
      which handles this automatically.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function send(conversationId: string, activity: ActivityLike):
        Promise<SentActivity>
      parameters:
        - id: conversationId
          type: string
          description: the conversation to send to
        - id: activity
          type: <xref uid="@microsoft/teams.api.ActivityLike" />
          description: the activity to send
      return:
        description: ''
        type: Promise&lt;<xref uid="@microsoft/teams.api.SentActivity" />&gt;
