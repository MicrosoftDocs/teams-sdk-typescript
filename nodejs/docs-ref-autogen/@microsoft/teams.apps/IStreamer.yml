### YamlMime:TSType
name: IStreamer
uid: '@microsoft/teams.apps.IStreamer'
package: '@microsoft/teams.apps'
summary: component that can send streamed chunks of an activity
fullName: IStreamer
remarks: ''
isDeprecated: false
type: interface
properties:
  - name: canceled
    uid: '@microsoft/teams.apps.IStreamer.canceled'
    package: '@microsoft/teams.apps'
    summary: >-
      whether the stream has been canceled.

      For example when the user pressed the Stop button or the 2-minute timeout
      has exceeded.
    fullName: canceled
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'canceled: boolean'
      return:
        description: ''
        type: boolean
  - name: events
    uid: '@microsoft/teams.apps.IStreamer.events'
    package: '@microsoft/teams.apps'
    summary: ''
    fullName: events
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'events: Omit<IEventEmitter<IStreamerEvents>, "emit">'
      return:
        description: ''
        type: >-
          Omit&lt;<xref uid="@microsoft/teams.common.IEventEmitter" />&lt;<xref
          uid="@microsoft/teams.apps.IStreamerEvents" />&gt;, "emit"&gt;
methods:
  - name: clearText()
    uid: '@microsoft/teams.apps.IStreamer.clearText'
    package: '@microsoft/teams.apps'
    summary: |-
      Discard accumulated streamed text and any pending text deltas, so the
      final message sent by `close()` doesn't include them. Useful when a
      mid-turn decision (e.g. a tool call producing a card) means the
      buffered text should not appear in the final activity. Typing chunks
      already shipped to Teams are not undone, but the final message updates
      the same activity to reflect the cleared state.
    remarks: ''
    isDeprecated: false
    syntax:
      content: function clearText()
  - name: close()
    uid: '@microsoft/teams.apps.IStreamer.close'
    package: '@microsoft/teams.apps'
    summary: close the stream
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function close(): undefined | SentActivity | Promise<undefined |
        SentActivity>
      return:
        description: ''
        type: >-
          undefined | <xref uid="@microsoft/teams.api.SentActivity" /> |
          Promise&lt;undefined | <xref uid="@microsoft/teams.api.SentActivity"
          />&gt;
  - name: emit(string | Partial<IMessageActivity | ITypingActivity>)
    uid: '@microsoft/teams.apps.IStreamer.emit'
    package: '@microsoft/teams.apps'
    summary: emit an activity chunk
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function emit(activity: string | Partial<IMessageActivity |
        ITypingActivity>)
      parameters:
        - id: activity
          type: >-
            string | Partial&lt;<xref
            uid="@microsoft/teams.api.IMessageActivity" /> | <xref
            uid="@microsoft/teams.api.ITypingActivity" />&gt;
          description: the activity to send
  - name: update(string)
    uid: '@microsoft/teams.apps.IStreamer.update'
    package: '@microsoft/teams.apps'
    summary: send status updates before emitting (ex. "Thinking...")
    remarks: ''
    isDeprecated: false
    syntax:
      content: 'function update(text: string)'
      parameters:
        - id: text
          type: string
          description: the status text to send
