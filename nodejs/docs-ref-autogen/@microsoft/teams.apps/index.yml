  - name: toThreadedConversationId(string, string)
    uid: '@microsoft/teams.apps.toThreadedConversationId'
    package: '@microsoft/teams.apps'
    summary: >-
      Constructs a threaded conversation ID by appending
      `;messageid={messageId}`

      to the conversation ID. This is the format APX uses to route messages

      to a specific thread.
    remarks: ''
    isDeprecated: false
    syntax:
      content: >-
        function toThreadedConversationId(conversationId: string, messageId:
        string): string
      parameters:
        - id: conversationId
          type: string
          description: the conversation to thread into (e.g. `19:abc@thread.skype`)
        - id: messageId
          type: string
          description: the thread root message ID (must be a non-zero numeric string)
      return:
        description: >-
          the threaded conversation ID (e.g.
          `19:abc@thread.skype;messageid=123`)
        type: string
