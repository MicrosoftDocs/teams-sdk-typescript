customDeprecatedMessage: >-
  Use the httpServerAdapter option instead:
    new App({ httpServerAdapter: new ExpressAdapter() })

  This wrapper will be removed in a future version.


  NOTE: This plugin is named "HttpPlugin" for historical reasons and backwards
  compatibility.

  It is the default HTTP plugin that uses Express as the underlying framework.
